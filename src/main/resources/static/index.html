<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Wrap&Drive - Sklep</title>
    <style>
        :root { --mint: #A3D2CA; --dark-grey: #4A4A4A; --light-grey: #F5F5F5; --border: #E0E0E0; }
        body { background-color: #FFFFFF; color: var(--dark-grey); font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; }
        header { border-bottom: 1px solid var(--border); padding: 10px 0; text-align: center; }
        .header-top { display: flex; justify-content: space-between; align-items: center; padding: 0 50px; }
        .nav-links a { text-decoration: none; color: var(--dark-grey); margin-right: 20px; font-size: 14px; text-transform: uppercase; }
        .logo-container img { height: 120px; }
        .header-actions button { background: var(--mint); color: white; border: none; padding: 8px 15px; cursor: pointer; text-transform: uppercase; }
        .main-content { display: flex; padding: 30px 50px; gap: 40px; }
        .filters { width: 200px; }
        .filters h3 { font-size: 16px; text-transform: uppercase; border-bottom: 1px solid var(--mint); padding-bottom: 10px; margin-bottom: 20px; }
        .filter-section { margin-bottom: 25px; }
        .filter-section h4 { font-size: 13px; text-transform: uppercase; margin-bottom: 10px; }
        .filter-section label { display: block; font-size: 13px; margin-bottom: 8px; color: #777; }
        .btn-apply { width: 100%; background: var(--mint); color: white; border: none; padding: 10px; cursor: pointer; text-transform: uppercase; }
        .products-section { flex: 1; }
        .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .product-card { border: 1px solid var(--border); padding: 15px; text-align: center; }
        .product-card h2 { font-size: 14px; margin: 10px 0; font-weight: normal; }
        .product-card .price { font-weight: bold; color: #888; font-size: 14px; margin-bottom: 15px; }
        .btn-add { background: var(--mint); color: white; border: none; width: 100%; padding: 10px; margin-bottom: 10px; cursor: pointer; font-size: 12px; }
        .qty-selector { display: flex; justify-content: center; align-items: center; border: 1px solid var(--border); background: var(--light-grey); }
        .qty-selector button { border: none; background: none; padding: 5px 15px; cursor: pointer; }
        .qty-selector input { width: 30px; border: none; text-align: center; background: none; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.8); z-index: 1000; justify-content: center; align-items: center; }
        .auth-card { background-color: #FFFFFF; border: 1px solid var(--border); width: 340px; padding: 40px; text-align: center; position: relative; border-top: 4px solid var(--mint); }
        .close-btn { position: absolute; top: 15px; right: 20px; color: #aaa; font-size: 24px; cursor: pointer; background: none; border: none; }
        .tabs { display: flex; justify-content: center; margin-bottom: 30px; border-bottom: 2px solid var(--border); }
        .tab { padding: 10px 20px; text-transform: uppercase; font-size: 13px; cursor: pointer; color: #AAAAAA; text-decoration: none; }
        .tab.active { color: var(--dark-grey); border-bottom: 3px solid var(--mint); margin-bottom: -2px; font-weight: bold; }
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 13px; margin-bottom: 8px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid var(--border); box-sizing: border-box; }
        .btn-submit { width: 100%; background-color: var(--mint); color: white; border: none; padding: 14px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>
<header>
    <div class="header-top">
        <div class="nav-links"><a href="#">Home</a> <a href="#">Shop</a></div>
        <div class="logo-container"><img src="W&D.jpg" alt="Logo"></div>
        <div class="header-actions">
            <button onclick="document.getElementById('loginModal').style.display='flex'">Zaloguj</button>
        </div>
    </div>
</header>
<div class="main-content">
    <aside class="filters">
        <h3>Filtruj</h3>
        <div class="filter-section">
            <h4>Producent</h4>
            <label><input type="checkbox"> Avery Dennison</label>
            <label><input type="checkbox"> 3M</label>
        </div>
        <button class="btn-apply">Zastosuj</button>
    </aside>
    <main class="products-section">
        <div class="product-grid">
            <div class="product-card">
                <h2>Carbon Fiber Black</h2>
                <div class="price">od 100 zł/m²</div>
                <button class="btn-add">DODAJ DO KOSZYKA</button>
                <div class="qty-selector"><button>-</button><input type="text" value="1"><button>+</button></div>
            </div>
        </div>
    </main>
</div>
<div class="modal-overlay" id="loginModal">
    <div class="auth-card">
        <button class="close-btn" onclick="document.getElementById('loginModal').style.display='none'">&times;</button>
        <div class="tabs"><a href="#" class="tab active">Logowanie</a></div>
        <form action="/api/auth/login" method="POST">
            <div class="input-group"><label>E-mail</label><input type="email" name="email" required></div>
            <div class="input-group"><label>Hasło</label><input type="password" name="password" required></div>
            <button type="submit" class="btn-submit">ZALOGUJ SIĘ</button>
        </form>
    </div>
</div>
</body>
</html>
