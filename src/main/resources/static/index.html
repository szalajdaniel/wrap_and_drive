<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Wrap&Drive - Sklep</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="store-layout">
<header>
    <div class="header-top">
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="#">Shop</a>
            <a href="#">Gallery</a>
            <a href="#">Services</a>
        </div>

        <div class="logo-container">
            <h2 style="visibility: hidden;">WRAP&DRIVE</h2>
            <img src="logo.png" alt="Wrap&Drive Logo" class="header-logo" onerror="this.style.display='none'">
        </div>

        <div class="header-actions">
            <span id="auth-buttons"></span>
            <a href="cart.html" class="cart-link">
                Koszyk <span id="cart-badge" class="cart-badge">0</span>
            </a>
        </div>
    </div>
</header>

<div class="page-title-section">
    <div class="container">
        <div class="placeholder-box"></div>
        <div class="title-text">
            <h1>Katalog Folii</h1>
            <div class="breadcrumbs">Home / <strong>Katalog Folii</strong></div>
        </div>
    </div>
</div>

<div class="shop-container container">
    <aside class="sidebar">
        <div class="filter-header">FILTRUJ <span class="arrow">v</span></div>

        <div class="filter-group">
            <h4>PRODUCENT</h4>
            <label class="checkbox-label"><input type="checkbox"> Avery Dennison</label>
            <label class="checkbox-label"><input type="checkbox"> 3M</label>
            <label class="checkbox-label"><input type="checkbox"> Oracal</label>
        </div>

        <div class="filter-group">
            <h4>WYKOŃCZENIE</h4>
            <label class="checkbox-label"><input type="checkbox"> Glossy</label>
            <label class="checkbox-label"><input type="checkbox"> Matte</label>
            <label class="checkbox-label"><input type="checkbox"> Satin</label>
            <label class="checkbox-label"><input type="checkbox"> Carbon Fiber</label>
            <label class="checkbox-label"><input type="checkbox"> Forged Carbon</label>
            <label class="checkbox-label"><input type="checkbox"> Chrome</label>
        </div>

        <button class="btn-apply">ZASTOSUJ</button>
    </aside>

    <main class="shop-content">
        <div class="shop-top-bar">
            <div class="results-count">Wyniki wyszukiwania: <span id="product-count">0</span> folii</div>
            <div class="sort-box">
                Sortuj:
                <select>
                    <option>Domyślne</option>
                    <option>Cena rosnąco</option>
                    <option>Cena malejąco</option>
                </select>
            </div>
        </div>

        <div class="product-grid" id="product-grid">
        </div>
    </main>
</div>

<div id="loginModal" class="modal-overlay">
    <div class="auth-card">
        <h3>Logowanie</h3>
        <form onsubmit="handleLogin(event)">
            <input type="email" name="email" placeholder="E-mail" required>
            <input type="password" name="password" placeholder="Hasło" required>
            <button type="submit" class="btn-add">Zaloguj się</button>
            <button type="button" class="btn-secondary" style="margin-top:10px; width:100%;" onclick="this.closest('.modal-overlay').style.display='none'">Zamknij</button>
        </form>
    </div>
</div>

<div id="registerModal" class="modal-overlay">
    <div class="auth-card">
        <h3>Rejestracja</h3>
        <form onsubmit="handleRegister(event)">
            <input type="text" name="username" placeholder="Użytkownik" required>
            <input type="email" name="email" placeholder="E-mail" required>
            <input type="password" name="password" placeholder="Hasło" required>
            <button type="submit" class="btn-add">Załóż konto</button>
            <button type="button" class="btn-secondary" style="margin-top:10px; width:100%;" onclick="this.closest('.modal-overlay').style.display='none'">Zamknij</button>
        </form>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
