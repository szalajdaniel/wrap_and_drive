<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Kasa - Wrap&Drive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="form-layout">
<div class="form-container" style="max-width: 600px;">
    <div class="logo-container" style="margin-bottom: 20px;">


    <h3 style="text-align:center; margin-bottom: 20px;">Finalizacja zamówienia</h3>
    <form onsubmit="submitOrder(event)">
        <input type="text" name="fullName" placeholder="Imię i nazwisko" required style="width:100%; padding:12px; margin-bottom:10px; border:1px solid var(--border);">
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <input type="email" name="email" placeholder="E-mail" required style="flex:1; padding:12px; border:1px solid var(--border);">
            <input type="tel" name="phone" placeholder="Telefon" required style="flex:1; padding:12px; border:1px solid var(--border);">
        </div>
        <input type="text" name="address" placeholder="Adres" required style="width:100%; padding:12px; margin-bottom:20px; border:1px solid var(--border);">
        <button type="submit" class="btn-action" style="margin-top:0;">Zamawiam i płacę</button>
        <a href="cart.html" style="display:block; text-align:center; margin-top:15px; color:var(--grey); text-decoration:none;">Wróć do koszyka</a>
    </form>
</div>
<script src="app.js"></script>
</body>
</html>
