<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Koszyk - Wrap&Drive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="store-layout">
<header>
    <div class="header-top">
        <div class="nav-links"><a href="index.html">← Sklep</a></div>

        <div class="logo-container">
            <h2></h2>
            <img src="logo.png" alt="Wrap&Drive Logo" class="header-logo" onerror="this.style.display='none'">
        </div>

        <div class="header-actions">
            <span id="auth-buttons"></span>
            <a href="cart.html" class="cart-link">Koszyk <span id="cart-badge" class="cart-badge">0</span></a>
        </div>
    </div>
</header>
<div class="main-content">
    <div class="form-container" style="margin: 0 auto;">
        <h2>Twój Koszyk</h2>
        <div id="cart-items"></div>
        <div class="cart-summary">Suma: <strong id="cart-total">0.00 zł</strong></div>
        <button class="btn-action" onclick="proceedToCheckout()">Przejdź do kasy</button>
    </div>
</div>
<script src="app.js"></script>
</body>
</html>
